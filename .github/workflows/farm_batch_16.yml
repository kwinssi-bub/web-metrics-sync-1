name: Farm Automation - Batch X

on:
  workflow_dispatch:

jobs:
  run-farm:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies (Chrome & Xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb google-chrome-stable curl

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Automation Farm (Raw / Monos)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        export DISPLAY=:99
        xvfb-run -a python -m automation.main --stage full --monos --raw --git
